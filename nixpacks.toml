[phases.setup]
nixPkgs = ["python311", "nodejs_20", "libGL", "glib", "zlib", "freetype", "libjpeg", "harfbuzz", "openjpeg"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install -r backend/requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
